<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدیر سیستم | dailymarket-expiry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="brand-group">
    <div class="mark"><span>DM</span></div>
    <div class="brand-name">dailymarket-expiry<small>سامانه مدیریت کالای نزدیک به انقضا</small></div>
  </div>
  <div class="right">
    <span class="pill">مدیر سیستم</span>
    <a href="#" class="link-ghost" id="logoutBtn">خروج</a>
  </div>
</div>

<div class="container">
  <div class="page-head">
    <h1>مدیریت سامانه</h1>
    <p>فروشگاه‌ها، نقش‌های کاربری و نمای کلی کالاها.</p>
  </div>

  <div id="alert" class="alert alert-error"></div>

  <div class="stat-grid" id="statGrid"></div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">افزودن فروشگاه جدید</h2>
    <form id="storeForm">
      <div class="field-row">
        <div class="field">
          <label for="s_name">نام فروشگاه</label>
          <input type="text" id="s_name" required>
        </div>
        <div class="field">
          <label for="s_region">منطقه</label>
          <input type="text" id="s_region" required>
        </div>
      </div>
      <div class="field">
        <label for="s_address">آدرس</label>
        <input type="text" id="s_address">
      </div>
      <button type="submit" id="storeBtn" class="btn btn-primary">افزودن فروشگاه</button>
    </form>
  </div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">جست‌وجوی فروشگاه‌ها</h2>
    <div class="filter-bar">
      <input type="text" id="storeSearch" placeholder="جست‌وجو با نام، کد یا منطقه‌ی فروشگاه...">
    </div>
    <div id="storesWrap"><div class="empty">برای مشاهده، عبارتی را جست‌وجو کنید یا صبر کنید فهرست اولیه بارگذاری شود...</div></div>
  </div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">آخرین کالاهای ثبت‌شده</h2>
    <div class="filter-bar">
      <select id="statusFilter">
        <option value="">همه‌ی وضعیت‌ها</option>
        <option value="approved">ثبت‌شده</option>
        <option value="sold">فروخته‌شده</option>
        <option value="rejected">ردشده</option>
      </select>
    </div>
    <div id="batchesWrap"><div class="empty">در حال بارگذاری...</div></div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const session = nhRequireRole(["system_admin"]);
  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); nhLogout(); });

  const alertEl = document.getElementById("alert");
  const statGrid = document.getElementById("statGrid");
  const storesWrap = document.getElementById("storesWrap");
  const batchesWrap = document.getElementById("batchesWrap");
  const storeBtn = document.getElementById("storeBtn");
  let searchTimer = null;

  function showError(message) {
    if (message === "SESSION_EXPIRED") {
      alertEl.textContent = "نشست شما منقضی شده است. در حال انتقال به صفحه‌ی ورود...";
      alertEl.classList.add("show");
      setTimeout(nhLogout, 1500);
      return;
    }
    alertEl.textContent = "خطا: " + message;
    alertEl.classList.add("show");
  }

  function renderStoresTable(stores) {
    storesWrap.innerHTML = stores.length ? `
      <div class="table-wrap">
      <table>
        <thead><tr><th>کد</th><th>نام</th><th>منطقه</th><th>وضعیت</th></tr></thead>
        <tbody>
          ${stores.map(s => `
            <tr>
              <td class="num">${s.store_code || "—"}</td>
              <td>${s.name}</td>
              <td>${s.region}</td>
              <td>${s.is_active ? '<span class="stamp stamp-approved">فعال</span>' : '<span class="stamp stamp-rejected">غیرفعال</span>'}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    ` : '<div class="empty">فروشگاهی با این مشخصات یافت نشد.</div>';
  }

  async function searchStores(term) {
    const query = term ? `
      query SearchStores($q: String!) {
        stores(
          where: { _or: [{ name: { _ilike: $q } }, { region: { _ilike: $q } }, { store_code: { _ilike: $q } }] }
          order_by: { name: asc }
          limit: 30
        ) { id store_code name region is_active }
      }
    ` : `
      query FirstStores {
        stores(order_by: { name: asc }, limit: 30) { id store_code name region is_active }
      }
    `;
    try {
      const data = await nhGql(query, term ? { q: `%${term}%` } : {}, session.token);
      renderStoresTable(data.stores);
    } catch (err) {
      showError(err.message);
    }
  }

  document.getElementById("storeSearch").addEventListener("input", (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchStores(e.target.value.trim()), 300);
  });

  async function loadBatches() {
    const status = document.getElementById("statusFilter").value;
    const whereClause = status ? `where: { status: { _eq: "${status}" } }` : "";
    const query = `
      query RecentBatches {
        expiry_batches(${whereClause} order_by: { created_at: desc }, limit: 30) {
          id product_name quantity unit expiry_date status store { name }
        }
      }
    `;
    const data = await nhGql(query, {}, session.token);
    batchesWrap.innerHTML = data.expiry_batches.length ? `
      <div class="table-wrap">
      <table>
        <thead><tr><th>کالا</th><th>فروشگاه</th><th>تعداد</th><th>انقضا</th><th>وضعیت</th></tr></thead>
        <tbody>
          ${data.expiry_batches.map(b => `
            <tr>
              <td>${b.product_name}</td>
              <td>${b.store.name}</td>
              <td class="num">${b.quantity} ${b.unit}</td>
              <td class="num">${nhIsoToJalaliStr(b.expiry_date)}</td>
              <td><span class="${nhStampClass(b.status)}">${STATUS_LABEL[b.status] || b.status}</span></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    ` : '<div class="empty">با این فیلتر کالایی یافت نشد.</div>';
  }

  document.getElementById("statusFilter").addEventListener("change", loadBatches);

  async function loadStats() {
    const query = `
      query AdminStats {
        stores_aggregate { aggregate { count } }
        approved: expiry_batches_aggregate(where: { status: { _eq: "approved" } }) { aggregate { count } }
        sold: expiry_batches_aggregate(where: { status: { _eq: "sold" } }) { aggregate { count } }
        rejected: expiry_batches_aggregate(where: { status: { _eq: "rejected" } }) { aggregate { count } }
      }
    `;
    const data = await nhGql(query, {}, session.token);
    statGrid.innerHTML = `
      <div class="stat-card"><span class="num">${data.stores_aggregate.aggregate.count}</span><span class="lbl">فروشگاه ثبت‌شده</span></div>
      <div class="stat-card"><span class="num">${data.approved.aggregate.count}</span><span class="lbl">${STATUS_LABEL.approved}</span></div>
      <div class="stat-card"><span class="num">${data.sold.aggregate.count}</span><span class="lbl">${STATUS_LABEL.sold}</span></div>
      <div class="stat-card"><span class="num">${data.rejected.aggregate.count}</span><span class="lbl">${STATUS_LABEL.rejected}</span></div>
    `;
  }

  document.getElementById("storeForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    storeBtn.disabled = true;
    storeBtn.textContent = "در حال افزودن...";

    const mutation = `
      mutation AddStore($name: String!, $region: String!, $address: String) {
        insert_stores_one(object: { name: $name, region: $region, address: $address, is_active: true }) { id }
      }
    `;

    try {
      await nhGql(mutation, {
        name: document.getElementById("s_name").value.trim(),
        region: document.getElementById("s_region").value.trim(),
        address: document.getElementById("s_address").value.trim() || null
      }, session.token);
      document.getElementById("storeForm").reset();
      await Promise.all([loadStats(), searchStores(document.getElementById("storeSearch").value.trim())]);
    } catch (err) {
      showError(err.message);
    } finally {
      storeBtn.disabled = false;
      storeBtn.textContent = "افزودن فروشگاه";
    }
  });

  Promise.all([loadStats(), searchStores(""), loadBatches()]).catch(err => showError(err.message));
</script>

</body>
</html>
