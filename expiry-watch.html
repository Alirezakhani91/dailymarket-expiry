<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پایش انقضا | dailymarket-expiry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="brand-group">
    <div class="mark"><span>DM</span></div>
    <div class="brand-name">dailymarket-expiry<small>سامانه مدیریت کالای نزدیک به انقضا</small></div>
  </div>
  <div class="right">
    <span class="pill" id="rolePill">...</span>
    <a href="#" class="link-ghost" id="backLink">بازگشت به گزارش کلی</a>
    <a href="sales.html" class="link-ghost">فروش</a>
    <a href="#" class="link-ghost" id="logoutBtn">خروج</a>
  </div>
</div>

<div class="container">
  <div class="page-head">
    <h1>پایش انقضا</h1>
    <p>چند روز تا انقضای هر کالا مانده، و کجا باید همین حالا تصمیم بگیرید.</p>
  </div>

  <div id="alert" class="alert alert-error"></div>

  <div id="heroWrap"></div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">روند روزانه</h2>
    <div id="chartWrap"></div>
  </div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">تفکیک روزشمار</h2>
    <p style="font-size:12.5px; color:var(--muted); margin:-8px 0 14px;" id="hintText"></p>
    <div class="filter-bar">
      <select id="groupByMode">
        <option value="product">بر اساس کالا</option>
        <option value="group">بر اساس گروه کالایی</option>
      </select>
      <input type="text" id="search" placeholder="جست‌وجو در نام کالا/گروه...">
      <label class="checkbox-inline"><input type="checkbox" id="activeOnly" checked> فقط کالاهای فعال (غیر از فروخته‌شده)</label>
      <span class="filter-count" id="rowCount"></span>
    </div>
    <div id="matrixWrap"><div class="empty">در حال بارگذاری...</div></div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const session = nhRequireRole(["region_manager", "executive_manager"]);
  let myManagerName = null;
  let allBatches = [];

  document.getElementById("rolePill").textContent = ROLE_LABEL[session.role];
  document.getElementById("backLink").href = ROLE_HOME[session.role];
  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); nhLogout(); });

  const canSell = session.role === "region_manager";
  document.getElementById("hintText").textContent = canSell
    ? "روی هر عدد کلیک کنید تا همان مقدار به‌عنوان فروخته‌شده ثبت شود. روی «مجموع» کلیک کنید تا کل آن کالا فروخته‌شده ثبت شود."
    : "";

  const alertEl = document.getElementById("alert");
  const heroWrap = document.getElementById("heroWrap");
  const chartWrap = document.getElementById("chartWrap");
  const matrixWrap = document.getElementById("matrixWrap");

  const BUCKETS = [
    { key: "expired", label: "منقضی‌شده" },
    { key: "d0", label: "امروز" },
    { key: "d1", label: "۱ روز" },
    { key: "d2", label: "۲ روز" },
    { key: "d3", label: "۳ روز" },
    { key: "d4", label: "۴ روز" },
    { key: "d5", label: "۵ روز" },
    { key: "d6", label: "۶ روز" },
    { key: "d7", label: "۷ روز" },
    { key: "more", label: "بیشتر از ۷ روز" }
  ];
  const URGENT_KEYS = ["expired", "d0", "d1", "d2", "d3"];
  const WARN_KEYS = ["d4", "d5", "d6", "d7"];

  function showError(message) {
    if (message === "SESSION_EXPIRED") {
      alertEl.className = "alert alert-error show";
      alertEl.textContent = "نشست شما منقضی شده است. در حال انتقال به صفحه‌ی ورود...";
      setTimeout(nhLogout, 1500);
      return;
    }
    alertEl.className = "alert alert-error show";
    alertEl.textContent = "خطا: " + message;
  }

  function showSuccess(message) {
    alertEl.className = "alert alert-success show";
    alertEl.textContent = message;
    setTimeout(() => alertEl.classList.remove("show"), 3000);
  }

  function dayBucket(isoDate) {
    const [gy, gm, gd] = isoDate.split("-").map(Number);
    const target = Date.UTC(gy, gm - 1, gd);
    const now = new Date();
    const today = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
    const diff = Math.round((target - today) / 86400000);
    if (diff < 0) return "expired";
    if (diff === 0) return "d0";
    if (diff >= 1 && diff <= 7) return "d" + diff;
    return "more";
  }

  function sumQty(list) {
    return list.reduce((s, b) => s + (Number(b.quantity) || 0), 0);
  }

  async function loadMyManager() {
    const query = `
      query MyRole($user_id: uuid!) {
        user_roles(where: { user_id: { _eq: $user_id } }, limit: 1) { manager_name }
      }
    `;
    const data = await nhGql(query, { user_id: session.userId }, session.token);
    if (!data.user_roles.length || !data.user_roles[0].manager_name) {
      showError("نام مدیری برای این حساب ثبت نشده است.");
      return;
    }
    myManagerName = data.user_roles[0].manager_name;
    await loadData();
  }

  async function loadData() {
    const ownerField = session.role === "executive_manager" ? "executive_manager_name" : "region_manager_name";
    const query = `
      query MyBatches($mgr: String!) {
        expiry_batches(
          where: { store: { ${ownerField}: { _eq: $mgr } } }
          order_by: { expiry_date: asc }
          limit: 5000
        ) {
          id product_id store_id created_by product_name product_group quantity unit expiry_date status
        }
      }
    `;
    const data = await nhGql(query, { mgr: myManagerName }, session.token);
    allBatches = data.expiry_batches.map(b => ({ ...b, bucket: dayBucket(b.expiry_date) }));
    render();
  }

  function activeRows() {
    const onlyActive = document.getElementById("activeOnly").checked;
    return onlyActive ? allBatches.filter(b => b.status !== "sold") : allBatches;
  }

  function render() {
    renderHero();
    renderChart();
    renderMatrix();
  }

  // ---------- hero zone summary ----------
  function renderHero() {
    const rows = activeRows();
    const urgentRows = rows.filter(b => URGENT_KEYS.includes(b.bucket));
    const warnRows = rows.filter(b => WARN_KEYS.includes(b.bucket));
    const safeRows = rows.filter(b => b.bucket === "more");

    const qUrgent = sumQty(urgentRows);
    const qWarn = sumQty(warnRows);
    const qSafe = sumQty(safeRows);

    const byProduct = {};
    urgentRows.forEach(b => { byProduct[b.product_name] = (byProduct[b.product_name] || 0) + Number(b.quantity || 0); });
    const top = Object.entries(byProduct).sort((a, b) => b[1] - a[1])[0];

    heroWrap.innerHTML = `
      <div class="hero-grid">
        <div class="hero-card hero-urgent">
          <div class="hero-num">${qUrgent}</div>
          <div class="hero-lbl">نیاز به تصمیم فوری</div>
          <div class="hero-sub">منقضی‌شده تا ۳ روز آینده</div>
        </div>
        <div class="hero-card hero-warn">
          <div class="hero-num">${qWarn}</div>
          <div class="hero-lbl">در حال نزدیک شدن</div>
          <div class="hero-sub">۴ تا ۷ روز آینده</div>
        </div>
        <div class="hero-card hero-safe">
          <div class="hero-num">${qSafe}</div>
          <div class="hero-lbl">وضعیت پایدار</div>
          <div class="hero-sub">بیشتر از ۷ روز فرصت</div>
        </div>
      </div>
      ${top ? `<div class="insight-banner">بیشترین ریسک همین حالا: <strong>${top[0]}</strong> با ${top[1]} عدد در بازه‌ی فوری (۰ تا ۳ روز آینده).</div>` : ""}
    `;
  }

  // ---------- daily trend chart ----------
  function lerpColor(c1, c2, t) {
    const p = hex => [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    const [r1, g1, b1] = p(c1), [r2, g2, b2] = p(c2);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    return `rgb(${r},${g},${b})`;
  }

  function renderChart() {
    const rows = activeRows();
    const counts = {};
    BUCKETS.forEach(b => counts[b.key] = 0);
    rows.forEach(b => counts[b.bucket] += Number(b.quantity) || 0);

    const W = 900, H = 220;
    const barGap = 12;
    const n = BUCKETS.length;
    const barW = (W - barGap * (n + 1)) / n;
    const chartTop = 30;
    const chartBottom = H - 40;
    const chartH = chartBottom - chartTop;
    const maxVal = Math.max(...BUCKETS.map(b => counts[b.key]), 1);

    const bars = BUCKETS.map((b, i) => {
      const val = counts[b.key];
      const h = (val / maxVal) * chartH;
      const x = barGap + i * (barW + barGap);
      const y = chartBottom - h;
      const color = lerpColor("#9f2136", "#efe6e3", i / (n - 1));
      return { x, y, h, val, label: b.label, color, cx: x + barW / 2 };
    });

    chartWrap.innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block; overflow:visible;">
        <defs>
          <filter id="barShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#9f2136" flood-opacity="0.18"/>
          </filter>
        </defs>
        <line x1="0" y1="${chartBottom}" x2="${W}" y2="${chartBottom}" style="stroke:var(--line); stroke-width:1;"/>
        ${bars.map(bar => `
          <g>
            <rect class="bar-anim" x="${bar.x}" y="${bar.y}" width="${barW}" height="${Math.max(bar.h, 2)}"
                  rx="7" fill="${bar.color}" filter="url(#barShadow)"
                  style="transform-origin:${bar.cx}px ${chartBottom}px;"></rect>
            <text x="${bar.cx}" y="${bar.y - 10}" text-anchor="middle" class="chart-value-label">${bar.val}</text>
            <text x="${bar.cx}" y="${H - 18}" text-anchor="middle" class="chart-day-label">${bar.label}</text>
          </g>
        `).join("")}
      </svg>
    `;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        chartWrap.querySelectorAll(".bar-anim").forEach(el => el.classList.add("grown"));
      });
    });
  }

  // ---------- sparkline mini chart per row ----------
  function sparkline(values) {
    const w = 96, h = 26, gap = 1.6;
    const n = values.length;
    const bw = (w - gap * (n + 1)) / n;
    const max = Math.max(...values, 1);
    const bars = values.map((v, i) => {
      const bh = v > 0 ? Math.max((v / max) * h, 3) : 1.5;
      const x = gap + i * (bw + gap);
      const y = h - bh;
      const urgent = URGENT_KEYS.includes(BUCKETS[i].key);
      const fill = v === 0 ? "var(--line)" : (urgent ? "#9f2136" : "#d8b8bd");
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="1" fill="${fill}"/>`;
    }).join("");
    return `<svg viewBox="0 0 ${w} ${h}" class="spark">${bars}</svg>`;
  }

  // ---------- heatmap matrix ----------
  function heatCell(val, rowMax) {
    if (!val) return '<span class="cell-zero">–</span>';
    const t = rowMax > 0 ? val / rowMax : 0;
    const bg = `rgba(159,33,54,${(0.10 + t * 0.62).toFixed(2)})`;
    const color = t > 0.5 ? "#ffffff" : "var(--ink)";
    return `<span class="qty-chip heat" style="background:${bg}; color:${color};">${val}</span>`;
  }

  function renderMatrix() {
    const mode = document.getElementById("groupByMode").value;
    const term = document.getElementById("search").value.trim();
    const key = mode === "group" ? "product_group" : "product_name";
    const rows = activeRows();

    const grouped = {};
    rows.forEach(b => {
      const k = b[key] || "نامشخص";
      if (!grouped[k]) {
        grouped[k] = { total: 0 };
        BUCKETS.forEach(bk => grouped[k][bk.key] = 0);
      }
      grouped[k][b.bucket] += Number(b.quantity) || 0;
      grouped[k].total += Number(b.quantity) || 0;
    });

    let entries = Object.entries(grouped);
    if (term) entries = entries.filter(([name]) => name.includes(term));
    entries.sort((a, b) => {
      const urgentA = URGENT_KEYS.reduce((s, k) => s + a[1][k], 0);
      const urgentB = URGENT_KEYS.reduce((s, k) => s + b[1][k], 0);
      return urgentB - urgentA;
    });

    document.getElementById("rowCount").textContent = entries.length ? `${entries.length} مورد` : "";

    if (!entries.length) {
      matrixWrap.innerHTML = '<div class="empty">داده‌ای برای نمایش وجود ندارد.</div>';
      return;
    }

    matrixWrap.innerHTML = `
      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>${mode === "group" ? "گروه کالایی" : "کالا"}</th>
            ${BUCKETS.map(b => `<th>${b.label}</th>`).join("")}
            <th>مجموع</th>
          </tr>
        </thead>
        <tbody>
          ${entries.map(([name, v], idx) => {
            const rowMax = Math.max(...BUCKETS.map(b => v[b.key]));
            return `
            <tr>
              <td>${name}</td>
              ${BUCKETS.map(b => `
                <td class="num ${canSell && v[b.key] > 0 ? "cell-clickable" : ""}"
                    ${canSell && v[b.key] > 0 ? `data-idx="${idx}" data-bucket="${b.key}"` : ""}>${heatCell(v[b.key], rowMax)}</td>
              `).join("")}
              <td class="num ${canSell && v.total > 0 ? "cell-clickable" : ""}" ${canSell && v.total > 0 ? `data-idx="${idx}" data-bucket="all"` : ""}>${heatCell(v.total, v.total)}</td>
            </tr>
          `}).join("")}
        </tbody>
      </table>
      </div>
    `;

    if (canSell) {
      matrixWrap.querySelectorAll("td.cell-clickable").forEach(td => {
        td.addEventListener("click", () => {
          const idx = parseInt(td.dataset.idx);
          const bucketKey = td.dataset.bucket;
          const [name] = entries[idx];
          openSellModal(name, mode, bucketKey);
        });
      });
    }
  }

  function openSellModal(name, mode, bucketKey) {
    const key = mode === "group" ? "product_group" : "product_name";
    let targets = activeRows().filter(b => (b[key] || "نامشخص") === name && b.status !== "sold");
    if (bucketKey !== "all") targets = targets.filter(b => b.bucket === bucketKey);
    if (!targets.length) return;

    const totalQty = sumQty(targets);
    const bucketLabel = bucketKey === "all" ? "همه‌ی بازه‌ها" : BUCKETS.find(b => b.key === bucketKey).label;

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-card">
        <div class="modal-title">${name}</div>
        <div class="modal-sub">${bucketLabel} · موجود: ${totalQty} عدد</div>
        <label class="modal-label">چند عدد فروخته شد؟</label>
        <div class="stepper">
          <button type="button" class="stepper-btn" id="stepPlus">+</button>
          <input type="number" id="soldQtyInput" min="1" max="${totalQty}" value="${totalQty}">
          <button type="button" class="stepper-btn" id="stepMinus">−</button>
        </div>
        <button type="button" class="link-ghost" id="fillAllBtn" style="margin-top:10px; display:block;">انتخاب همه (${totalQty} عدد)</button>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="modalCancel">انصراف</button>
          <button type="button" class="btn btn-primary" id="modalConfirm">ثبت فروش</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const input = overlay.querySelector("#soldQtyInput");
    overlay.querySelector("#stepMinus").addEventListener("click", () => {
      input.value = Math.max(1, (parseInt(input.value) || 1) - 1);
    });
    overlay.querySelector("#stepPlus").addEventListener("click", () => {
      input.value = Math.min(totalQty, (parseInt(input.value) || 0) + 1);
    });
    overlay.querySelector("#fillAllBtn").addEventListener("click", () => { input.value = totalQty; });
    overlay.querySelector("#modalCancel").addEventListener("click", () => overlay.remove());
    overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });

    overlay.querySelector("#modalConfirm").addEventListener("click", async () => {
      let soldQty = parseInt(input.value) || 0;
      if (soldQty < 1) soldQty = 1;
      if (soldQty > totalQty) soldQty = totalQty;
      overlay.remove();
      await executeSale(targets, soldQty, name);
    });
  }

  async function executeSale(targets, soldQty, name) {
    const sorted = [...targets].sort((a, b) => a.expiry_date.localeCompare(b.expiry_date));
    let remaining = soldQty;
    const fullIds = [];
    let splitRow = null, splitAmount = 0;

    for (const row of sorted) {
      if (remaining <= 0) break;
      const q = Number(row.quantity);
      if (q <= remaining) {
        fullIds.push(row.id);
        remaining -= q;
      } else {
        splitRow = row;
        splitAmount = remaining;
        remaining = 0;
      }
    }

    try {
      const soldAt = new Date().toISOString();

      if (fullIds.length) {
        await nhGql(`
          mutation MarkSold($ids: [uuid!]!, $sold_at: timestamptz!) {
            update_expiry_batches(where: { id: { _in: $ids } }, _set: { status: "sold", sold_at: $sold_at }) { affected_rows }
          }
        `, { ids: fullIds, sold_at: soldAt }, session.token);
      }

      if (splitRow) {
        await nhGql(`
          mutation ReduceQty($id: uuid!, $qty: numeric!) {
            update_expiry_batches_by_pk(pk_columns: { id: $id }, _set: { quantity: $qty }) { id }
          }
        `, { id: splitRow.id, qty: Number(splitRow.quantity) - splitAmount }, session.token);

        await nhGql(`
          mutation InsertSoldSplit(
            $store_id: uuid!, $product_id: uuid, $product_name: String!, $product_group: String,
            $quantity: numeric!, $unit: String!, $expiry_date: date!, $created_by: uuid!, $sold_at: timestamptz!
          ) {
            insert_expiry_batches_one(object: {
              store_id: $store_id, product_id: $product_id, product_name: $product_name, product_group: $product_group,
              quantity: $quantity, unit: $unit, expiry_date: $expiry_date, discount_percent: 0,
              created_by: $created_by, status: "sold", sold_at: $sold_at
            }) { id }
          }
        `, {
          store_id: splitRow.store_id,
          product_id: splitRow.product_id || null,
          product_name: splitRow.product_name,
          product_group: splitRow.product_group || null,
          quantity: splitAmount,
          unit: splitRow.unit,
          expiry_date: splitRow.expiry_date,
          created_by: splitRow.created_by,
          sold_at: soldAt
        }, session.token);
      }

      showSuccess(`${soldQty} عدد از «${name}» فروخته‌شده ثبت شد.`);
      await loadData();
    } catch (err) {
      showError(err.message);
    }
  }

  document.getElementById("groupByMode").addEventListener("change", renderMatrix);
  document.getElementById("search").addEventListener("input", renderMatrix);
  document.getElementById("activeOnly").addEventListener("change", render);

  loadMyManager().catch(err => showError(err.message));
</script>

</body>
</html>
