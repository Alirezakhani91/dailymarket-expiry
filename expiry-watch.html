<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پایش انقضا | dailymarket-expiry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="brand-group">
    <div class="mark"><span>DM</span></div>
    <div class="brand-name">dailymarket-expiry<small>سامانه مدیریت کالای نزدیک به انقضا</small></div>
  </div>
  <div class="right">
    <span class="pill" id="rolePill">...</span>
    <a href="#" class="link-ghost" id="backLink">بازگشت به گزارش کلی</a>
    <a href="#" class="link-ghost" id="logoutBtn">خروج</a>
  </div>
</div>

<div class="container">
  <div class="page-head">
    <h1>پایش انقضا — روزشمار</h1>
    <p>چند روز تا انقضای هر کالا مانده، به تفکیک کالا و گروه کالایی.</p>
  </div>

  <div id="alert" class="alert alert-error"></div>

  <div class="card">
    <div id="chartWrap"></div>
  </div>

  <div class="stat-grid" id="bucketGrid"></div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">تفکیک روزشمار</h2>
    <p style="font-size:12.5px; color:var(--muted); margin:-8px 0 14px;" id="hintText"></p>
    <div class="filter-bar">
      <select id="groupByMode">
        <option value="product">بر اساس کالا</option>
        <option value="group">بر اساس گروه کالایی</option>
      </select>
      <input type="text" id="search" placeholder="جست‌وجو در نام کالا/گروه...">
      <label class="checkbox-inline"><input type="checkbox" id="activeOnly" checked> فقط کالاهای فعال (غیر از فروخته/ردشده)</label>
      <span class="filter-count" id="rowCount"></span>
    </div>
    <div id="matrixWrap"><div class="empty">در حال بارگذاری...</div></div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const session = nhRequireRole(["region_manager", "executive_manager"]);
  let myManagerName = null;
  let allBatches = [];

  document.getElementById("rolePill").textContent = ROLE_LABEL[session.role];
  document.getElementById("backLink").href = ROLE_HOME[session.role];
  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); nhLogout(); });

  const canSell = session.role === "region_manager";
  document.getElementById("hintText").textContent = canSell
    ? "روی هر عدد کلیک کنید تا همان مقدار به‌عنوان فروخته‌شده ثبت شود. روی «مجموع» کلیک کنید تا کل آن کالا فروخته‌شده ثبت شود."
    : "";

  const alertEl = document.getElementById("alert");
  const chartWrap = document.getElementById("chartWrap");
  const bucketGrid = document.getElementById("bucketGrid");
  const matrixWrap = document.getElementById("matrixWrap");

  const BUCKETS = [
    { key: "expired", label: "منقضی‌شده" },
    { key: "d0", label: "امروز" },
    { key: "d1", label: "۱ روز" },
    { key: "d2", label: "۲ روز" },
    { key: "d3", label: "۳ روز" },
    { key: "d4", label: "۴ روز" },
    { key: "d5", label: "۵ روز" },
    { key: "d6", label: "۶ روز" },
    { key: "d7", label: "۷ روز" },
    { key: "more", label: "بیشتر از ۷ روز" }
  ];
  const URGENT_KEYS = ["expired", "d0", "d1", "d2", "d3"];

  function showError(message) {
    if (message === "SESSION_EXPIRED") {
      alertEl.className = "alert alert-error show";
      alertEl.textContent = "نشست شما منقضی شده است. در حال انتقال به صفحه‌ی ورود...";
      setTimeout(nhLogout, 1500);
      return;
    }
    alertEl.className = "alert alert-error show";
    alertEl.textContent = "خطا: " + message;
  }

  function showSuccess(message) {
    alertEl.className = "alert alert-success show";
    alertEl.textContent = message;
    setTimeout(() => alertEl.classList.remove("show"), 3000);
  }

  function dayBucket(isoDate) {
    const [gy, gm, gd] = isoDate.split("-").map(Number);
    const target = Date.UTC(gy, gm - 1, gd);
    const now = new Date();
    const today = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
    const diff = Math.round((target - today) / 86400000);
    if (diff < 0) return "expired";
    if (diff === 0) return "d0";
    if (diff >= 1 && diff <= 7) return "d" + diff;
    return "more";
  }

  function sumQty(list) {
    return list.reduce((s, b) => s + (Number(b.quantity) || 0), 0);
  }

  async function loadMyManager() {
    const query = `
      query MyRole($user_id: uuid!) {
        user_roles(where: { user_id: { _eq: $user_id } }, limit: 1) { manager_name }
      }
    `;
    const data = await nhGql(query, { user_id: session.userId }, session.token);
    if (!data.user_roles.length || !data.user_roles[0].manager_name) {
      showError("نام مدیری برای این حساب ثبت نشده است.");
      return;
    }
    myManagerName = data.user_roles[0].manager_name;
    await loadData();
  }

  async function loadData() {
    const ownerField = session.role === "executive_manager" ? "executive_manager_name" : "region_manager_name";
    const query = `
      query MyBatches($mgr: String!) {
        expiry_batches(
          where: { store: { ${ownerField}: { _eq: $mgr } } }
          order_by: { expiry_date: asc }
          limit: 5000
        ) {
          id product_name product_group quantity unit expiry_date status
        }
      }
    `;
    const data = await nhGql(query, { mgr: myManagerName }, session.token);
    allBatches = data.expiry_batches.map(b => ({ ...b, bucket: dayBucket(b.expiry_date) }));
    render();
  }

  function activeRows() {
    const onlyActive = document.getElementById("activeOnly").checked;
    return onlyActive ? allBatches.filter(b => b.status !== "sold" && b.status !== "rejected") : allBatches;
  }

  function render() {
    renderChart();
    renderBucketGrid();
    renderMatrix();
  }

  function lerpColor(c1, c2, t) {
    const p = hex => [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    const [r1, g1, b1] = p(c1), [r2, g2, b2] = p(c2);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    return `rgb(${r},${g},${b})`;
  }

  function renderChart() {
    const rows = activeRows();
    const counts = {};
    BUCKETS.forEach(b => counts[b.key] = 0);
    rows.forEach(b => counts[b.bucket] += Number(b.quantity) || 0);

    const W = 900, H = 230;
    const barGap = 12;
    const n = BUCKETS.length;
    const barW = (W - barGap * (n + 1)) / n;
    const chartTop = 34;
    const chartBottom = H - 42;
    const chartH = chartBottom - chartTop;
    const maxVal = Math.max(...BUCKETS.map(b => counts[b.key]), 1);

    const bars = BUCKETS.map((b, i) => {
      const val = counts[b.key];
      const h = (val / maxVal) * chartH;
      const x = barGap + i * (barW + barGap);
      const y = chartBottom - h;
      const color = lerpColor("#9f2136", "#efe6e3", i / (n - 1));
      const textColor = i / (n - 1) < 0.55 ? "#ffffff" : "var(--muted)";
      return { x, y, h, val, label: b.label, color, textColor, cx: x + barW / 2 };
    });

    chartWrap.innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block; overflow:visible;">
        <defs>
          <filter id="barShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#9f2136" flood-opacity="0.18"/>
          </filter>
        </defs>
        <line x1="0" y1="${chartBottom}" x2="${W}" y2="${chartBottom}" style="stroke:var(--line); stroke-width:1;"/>
        ${bars.map(bar => `
          <g>
            <rect class="bar-anim" x="${bar.x}" y="${bar.y}" width="${barW}" height="${Math.max(bar.h, 2)}"
                  rx="7" fill="${bar.color}" filter="url(#barShadow)"
                  style="transform-origin:${bar.cx}px ${chartBottom}px;"></rect>
            <text x="${bar.cx}" y="${bar.y - 10}" text-anchor="middle" class="chart-value-label">${bar.val}</text>
            <text x="${bar.cx}" y="${H - 20}" text-anchor="middle" class="chart-day-label">${bar.label}</text>
          </g>
        `).join("")}
      </svg>
    `;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        chartWrap.querySelectorAll(".bar-anim").forEach(el => el.classList.add("grown"));
      });
    });
  }

  function renderBucketGrid() {
    const rows = activeRows();
    const counts = {};
    BUCKETS.forEach(b => counts[b.key] = 0);
    rows.forEach(b => counts[b.bucket] += Number(b.quantity) || 0);

    bucketGrid.innerHTML = BUCKETS.map(b => `
      <div class="stat-card ${URGENT_KEYS.includes(b.key) ? "urgent" : ""}">
        <span class="num">${counts[b.key]}</span>
        <span class="lbl">${b.label}</span>
      </div>
    `).join("");
  }

  function cellHtml(val, urgent) {
    if (!val) return '<span class="cell-zero">–</span>';
    return `<span class="qty-chip ${urgent ? "urgent" : ""}">${val}</span>`;
  }

  function renderMatrix() {
    const mode = document.getElementById("groupByMode").value;
    const term = document.getElementById("search").value.trim();
    const key = mode === "group" ? "product_group" : "product_name";
    const rows = activeRows();

    const grouped = {};
    rows.forEach(b => {
      const k = b[key] || "نامشخص";
      if (!grouped[k]) {
        grouped[k] = { total: 0 };
        BUCKETS.forEach(bk => grouped[k][bk.key] = 0);
      }
      grouped[k][b.bucket] += Number(b.quantity) || 0;
      grouped[k].total += Number(b.quantity) || 0;
    });

    let entries = Object.entries(grouped);
    if (term) entries = entries.filter(([name]) => name.includes(term));
    entries.sort((a, b) => {
      const urgentA = URGENT_KEYS.reduce((s, k) => s + a[1][k], 0);
      const urgentB = URGENT_KEYS.reduce((s, k) => s + b[1][k], 0);
      return urgentB - urgentA;
    });

    document.getElementById("rowCount").textContent = entries.length ? `${entries.length} مورد` : "";

    if (!entries.length) {
      matrixWrap.innerHTML = '<div class="empty">داده‌ای برای نمایش وجود ندارد.</div>';
      return;
    }

    matrixWrap.innerHTML = `
      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>${mode === "group" ? "گروه کالایی" : "کالا"}</th>
            ${BUCKETS.map(b => `<th>${b.label}</th>`).join("")}
            <th>مجموع</th>
          </tr>
        </thead>
        <tbody>
          ${entries.map(([name, v], idx) => `
            <tr>
              <td>${name}</td>
              ${BUCKETS.map(b => `
                <td class="num ${canSell && v[b.key] > 0 ? "cell-clickable" : ""}"
                    ${canSell && v[b.key] > 0 ? `data-idx="${idx}" data-bucket="${b.key}"` : ""}>${cellHtml(v[b.key], URGENT_KEYS.includes(b.key))}</td>
              `).join("")}
              <td class="num ${canSell && v.total > 0 ? "cell-clickable" : ""}" ${canSell && v.total > 0 ? `data-idx="${idx}" data-bucket="all"` : ""}>${cellHtml(v.total, false)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    `;

    if (canSell) {
      matrixWrap.querySelectorAll("td.cell-clickable").forEach(td => {
        td.addEventListener("click", () => {
          const idx = parseInt(td.dataset.idx);
          const bucketKey = td.dataset.bucket;
          const [name] = entries[idx];
          markSold(name, mode, bucketKey);
        });
      });
    }
  }

  async function markSold(name, mode, bucketKey) {
    const key = mode === "group" ? "product_group" : "product_name";
    let targets = activeRows().filter(b => (b[key] || "نامشخص") === name && b.status !== "sold");
    if (bucketKey !== "all") targets = targets.filter(b => b.bucket === bucketKey);
    if (!targets.length) return;

    const qty = sumQty(targets);
    const bucketLabel = bucketKey === "all" ? "همه‌ی موارد" : BUCKETS.find(b => b.key === bucketKey).label;
    const ok = confirm(`${qty} عدد/واحد از «${name}» (${bucketLabel}) به‌عنوان فروخته‌شده ثبت شود؟`);
    if (!ok) return;

    const mutation = `
      mutation MarkSold($ids: [uuid!]!) {
        update_expiry_batches(where: { id: { _in: $ids } }, _set: { status: "sold" }) {
          affected_rows
        }
      }
    `;

    try {
      const ids = targets.map(b => b.id);
      await nhGql(mutation, { ids }, session.token);
      showSuccess(`${qty} عدد/واحد از «${name}» فروخته‌شده ثبت شد.`);
      await loadData();
    } catch (err) {
      showError(err.message);
    }
  }

  document.getElementById("groupByMode").addEventListener("change", renderMatrix);
  document.getElementById("search").addEventListener("input", renderMatrix);
  document.getElementById("activeOnly").addEventListener("change", render);

  loadMyManager().catch(err => showError(err.message));
</script>

</body>
</html>
