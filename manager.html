<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدیر منطقه | dailymarket-expiry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="brand-group">
    <div class="mark"><span>DM</span></div>
    <div class="brand-name">dailymarket-expiry<small>سامانه مدیریت کالای نزدیک به انقضا</small></div>
  </div>
  <div class="right">
    <span class="pill">مدیر منطقه</span>
    <span class="context-label" id="managerLabel">در حال بارگذاری...</span>
    <a href="#" class="link-ghost" id="logoutBtn">خروج</a>
  </div>
</div>

<div class="container">
  <div class="page-head">
    <h1>گزارش فروشگاه‌های تحت نظارت</h1>
    <p>وضعیت کالاهای ثبت‌شده در تمام فروشگاه‌های شما، به تفکیک هر فروشگاه.</p>
  </div>

  <div id="alert" class="alert alert-error"></div>

  <div class="stat-grid" id="statGrid"></div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">گزارش فروشگاه‌ها</h2>
    <div class="filter-bar">
      <input type="text" id="reportSearch" placeholder="جست‌وجو با نام یا کد فروشگاه...">
      <label class="checkbox-inline"><input type="checkbox" id="onlyPending"> فقط دارای مورد در انتظار</label>
      <span class="filter-count" id="reportCount"></span>
    </div>
    <div id="reportWrap"><div class="empty">در حال بارگذاری گزارش...</div></div>
  </div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">در انتظار بررسی</h2>
    <div class="filter-bar">
      <input type="text" id="storeSearch" placeholder="جست‌وجو بر اساس نام فروشگاه...">
      <span class="filter-count" id="filterCount"></span>
    </div>
    <div id="listWrap"><div class="empty">در حال بارگذاری فهرست...</div></div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const session = nhRequireRole(["region_manager"]);
  let myManagerName = null;
  let storesReport = [];
  let allPending = [];

  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); nhLogout(); });

  const alertEl = document.getElementById("alert");
  const managerLabel = document.getElementById("managerLabel");
  const statGrid = document.getElementById("statGrid");
  const reportWrap = document.getElementById("reportWrap");
  const listWrap = document.getElementById("listWrap");

  function showError(message) {
    if (message === "SESSION_EXPIRED") {
      alertEl.textContent = "نشست شما منقضی شده است. در حال انتقال به صفحه‌ی ورود...";
      alertEl.classList.add("show");
      setTimeout(nhLogout, 1500);
      return;
    }
    alertEl.textContent = "خطا: " + message;
    alertEl.classList.add("show");
  }

  async function loadMyManager() {
    const query = `
      query MyRole($user_id: uuid!) {
        user_roles(where: { user_id: { _eq: $user_id } }, limit: 1) { manager_name }
      }
    `;
    const data = await nhGql(query, { user_id: session.userId }, session.token);
    if (!data.user_roles.length || !data.user_roles[0].manager_name) {
      managerLabel.textContent = "نام مدیری برای این حساب ثبت نشده";
      return;
    }
    myManagerName = data.user_roles[0].manager_name;
    managerLabel.textContent = "مدیر منطقه: " + myManagerName;
    await Promise.all([loadReport(), loadPending()]);
  }

  async function loadReport() {
    const query = `
      query MyStoresReport($mgr: String!) {
        stores(where: { region_manager_name: { _eq: $mgr } }, order_by: { name: asc }) {
          id store_code name region
          total: expiry_batches_aggregate { aggregate { count } }
          draft: expiry_batches_aggregate(where: { status: { _eq: "draft" } }) { aggregate { count } }
          needs_correction: expiry_batches_aggregate(where: { status: { _eq: "needs_correction" } }) { aggregate { count } }
          approved: expiry_batches_aggregate(where: { status: { _eq: "approved" } }) { aggregate { count } }
          sold: expiry_batches_aggregate(where: { status: { _eq: "sold" } }) { aggregate { count } }
          rejected: expiry_batches_aggregate(where: { status: { _eq: "rejected" } }) { aggregate { count } }
        }
      }
    `;
    const data = await nhGql(query, { mgr: myManagerName }, session.token);
    storesReport = data.stores.map(s => ({
      id: s.id, store_code: s.store_code, name: s.name, region: s.region,
      draft: s.draft.aggregate.count,
      needs_correction: s.needs_correction.aggregate.count,
      approved: s.approved.aggregate.count,
      sold: s.sold.aggregate.count,
      rejected: s.rejected.aggregate.count,
      total: s.total.aggregate.count
    }));

    const sums = storesReport.reduce((acc, s) => {
      acc.draft += s.draft; acc.needs_correction += s.needs_correction;
      acc.approved += s.approved; acc.sold += s.sold; acc.rejected += s.rejected;
      return acc;
    }, { draft: 0, needs_correction: 0, approved: 0, sold: 0, rejected: 0 });

    statGrid.innerHTML = `
      <div class="stat-card"><span class="num">${storesReport.length}</span><span class="lbl">فروشگاه تحت نظارت</span></div>
      ${["draft", "needs_correction", "approved", "sold", "rejected"].map(k => `
        <div class="stat-card"><span class="num">${sums[k]}</span><span class="lbl">${STATUS_LABEL[k]}</span></div>
      `).join("")}
    `;

    renderReport();
  }

  function renderReport() {
    const term = document.getElementById("reportSearch").value.trim();
    const onlyPending = document.getElementById("onlyPending").checked;

    let rows = storesReport;
    if (term) rows = rows.filter(s => s.name.includes(term) || (s.store_code || "").includes(term));
    if (onlyPending) rows = rows.filter(s => s.draft + s.needs_correction > 0);

    rows = [...rows].sort((a, b) => (b.draft + b.needs_correction) - (a.draft + a.needs_correction));

    document.getElementById("reportCount").textContent =
      storesReport.length ? `${rows.length} از ${storesReport.length} فروشگاه` : "";

    if (!rows.length) {
      reportWrap.innerHTML = storesReport.length
        ? '<div class="empty">با این فیلتر فروشگاهی یافت نشد.</div>'
        : '<div class="empty">فروشگاهی برای این مدیر ثبت نشده است.</div>';
      return;
    }

    reportWrap.innerHTML = `
      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>کد</th><th>فروشگاه</th><th>منطقه</th>
            <th>پیش‌نویس</th><th>اصلاح</th><th>تأیید</th><th>فروش</th><th>رد</th><th>مجموع</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(s => `
            <tr>
              <td class="num">${s.store_code || "—"}</td>
              <td>${s.name}</td>
              <td>${s.region}</td>
              <td class="num ${s.draft > 0 ? "cell-alert" : ""}">${s.draft}</td>
              <td class="num ${s.needs_correction > 0 ? "cell-alert" : ""}">${s.needs_correction}</td>
              <td class="num">${s.approved}</td>
              <td class="num">${s.sold}</td>
              <td class="num">${s.rejected}</td>
              <td class="num">${s.total}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    `;
  }

  document.getElementById("reportSearch").addEventListener("input", renderReport);
  document.getElementById("onlyPending").addEventListener("change", renderReport);

  async function loadPending() {
    const query = `
      query PendingBatches($mgr: String!) {
        expiry_batches(
          where: {
            status: { _in: ["draft", "needs_correction"] }
            store: { region_manager_name: { _eq: $mgr } }
          }
          order_by: { created_at: asc }
        ) {
          id product_name quantity unit expiry_date discount_percent status
          store { name }
        }
      }
    `;
    const data = await nhGql(query, { mgr: myManagerName }, session.token);
    allPending = data.expiry_batches;
    renderPending();
  }

  function renderPending() {
    const term = document.getElementById("storeSearch").value.trim();
    const rows = term ? allPending.filter(b => b.store.name.includes(term)) : allPending;

    document.getElementById("filterCount").textContent =
      allPending.length ? `${rows.length} از ${allPending.length}` : "";

    if (!rows.length) {
      listWrap.innerHTML = allPending.length
        ? '<div class="empty">با این جست‌وجو موردی یافت نشد.</div>'
        : '<div class="empty">در حال حاضر پیش‌نویسی برای بررسی وجود ندارد.</div>';
      return;
    }
    listWrap.innerHTML = rows.map(b => `
      <div class="review-item" data-id="${b.id}">
        <div class="row1">
          <div>
            <div class="product">${b.product_name}</div>
            <div class="meta">${b.store.name} · ${b.quantity} ${b.unit} · انقضا: ${b.expiry_date} · تخفیف پیشنهادی: ${b.discount_percent}٪</div>
          </div>
          <span class="${nhStampClass(b.status)}">${STATUS_LABEL[b.status] || b.status}</span>
        </div>
        <div class="field" style="margin-bottom:0;">
          <textarea rows="2" placeholder="یادداشت بررسی (اختیاری برای تأیید، الزامی برای رد یا اصلاح)" class="note-input"></textarea>
        </div>
        <div class="review-actions">
          <button class="btn btn-success btn-sm" data-action="approved">تأیید</button>
          <button class="btn btn-outline btn-sm" data-action="needs_correction">نیاز به اصلاح</button>
          <button class="btn btn-danger btn-sm" data-action="rejected">رد</button>
        </div>
      </div>
    `).join("");

    listWrap.querySelectorAll(".review-item").forEach(item => {
      item.querySelectorAll("button[data-action]").forEach(btn => {
        btn.addEventListener("click", () => reviewBatch(item, btn.dataset.action));
      });
    });
  }

  document.getElementById("storeSearch").addEventListener("input", renderPending);

  async function reviewBatch(item, action) {
    const id = item.dataset.id;
    const note = item.querySelector(".note-input").value.trim();

    if (action !== "approved" && !note) {
      showError("برای رد یا درخواست اصلاح، نوشتن یادداشت بررسی الزامی است.");
      return;
    }

    const buttons = item.querySelectorAll("button");
    buttons.forEach(b => b.disabled = true);

    const mutation = `
      mutation ReviewBatch($id: uuid!, $status: String!, $note: String, $reviewer: uuid!) {
        update_expiry_batches_by_pk(
          pk_columns: { id: $id }
          _set: { status: $status, review_note: $note, reviewed_by: $reviewer }
        ) { id }
      }
    `;

    try {
      await nhGql(mutation, { id, status: action, note: note || null, reviewer: session.userId }, session.token);
      await Promise.all([loadReport(), loadPending()]);
    } catch (err) {
      showError(err.message);
      buttons.forEach(b => b.disabled = false);
    }
  }

  loadMyManager().catch(err => showError(err.message));
</script>

</body>
</html>
