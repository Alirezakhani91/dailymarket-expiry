<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اپراتور | dailymarket-expiry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="brand-group">
    <div class="mark"><span>DM</span></div>
    <div class="brand-name">dailymarket-expiry<small>سامانه مدیریت کالای نزدیک به انقضا</small></div>
  </div>
  <div class="right">
    <span class="pill">اپراتور فروشگاه</span>
    <span class="context-label" id="storeLabel">در حال بارگذاری...</span>
    <a href="#" class="link-ghost" id="logoutBtn">خروج</a>
  </div>
</div>

<div class="container">
  <div class="page-head">
    <h1>ثبت کالای نزدیک به انقضا</h1>
    <p>پس از ثبت، کالا بلافاصله در فهرست فروشگاه شما فعال می‌شود.</p>
  </div>

  <div id="alert" class="alert alert-error"></div>

  <div class="card">
    <form id="productForm">
      <div class="field">
        <label for="product_search">جست‌وجوی کالا (نام یا بارکد)</label>
        <div class="search-wrap">
          <input type="text" id="product_search" placeholder="مثلاً: ماست، یا بارکد کالا" autocomplete="off">
          <div id="productResults" class="search-results"></div>
        </div>
        <div id="selectedProduct" class="selected-chip"></div>
      </div>
      <div class="field">
        <label for="quantity">تعداد</label>
        <input type="number" id="quantity" required min="1" step="1">
      </div>
      <div class="field">
        <label for="expiry_day">تاریخ انقضا (شمسی)</label>
        <div class="jalali-date-row">
          <select id="expiry_year"></select>
          <select id="expiry_month"></select>
          <select id="expiry_day"></select>
        </div>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-block">ثبت کالا</button>
    </form>
  </div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">آخرین ثبت‌های این فروشگاه</h2>
    <div class="filter-bar">
      <select id="statusFilter">
        <option value="">همه‌ی وضعیت‌ها</option>
        <option value="approved">ثبت‌شده</option>
        <option value="sold">فروخته‌شده</option>
      </select>
    </div>
    <div id="listWrap"><div class="empty">در حال بارگذاری فهرست...</div></div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const session = nhRequireRole(["store_operator"]);
  let myStoreId = null;
  let selectedProductId = null;
  let selectedProductName = null;
  let selectedProductGroup = null;
  let allBatches = [];

  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); nhLogout(); });

  const alertEl = document.getElementById("alert");
  const storeLabel = document.getElementById("storeLabel");
  const submitBtn = document.getElementById("submitBtn");
  const listWrap = document.getElementById("listWrap");
  const searchInput = document.getElementById("product_search");
  const resultsBox = document.getElementById("productResults");
  const selectedBox = document.getElementById("selectedProduct");
  let searchTimer = null;

  searchInput.addEventListener("input", () => {
    clearTimeout(searchTimer);
    const term = searchInput.value.trim();
    if (term.length < 2) {
      resultsBox.classList.remove("show");
      resultsBox.innerHTML = "";
      return;
    }
    searchTimer = setTimeout(() => runProductSearch(term), 300);
  });

  document.addEventListener("click", (e) => {
    if (!resultsBox.contains(e.target) && e.target !== searchInput) {
      resultsBox.classList.remove("show");
    }
  });

  async function runProductSearch(term) {
    const query = `
      query SearchProducts($q: String!) {
        products(
          where: { _or: [{ name: { _ilike: $q } }, { barcode: { _ilike: $q } }] }
          limit: 15
          order_by: { name: asc }
        ) { id name barcode product_group }
      }
    `;
    try {
      const data = await nhGql(query, { q: `%${term}%` }, session.token);
      renderProductResults(data.products);
    } catch (err) {
      // جست‌وجو غیرحیاتی است؛ خطا را بی‌صدا نادیده می‌گیریم
    }
  }

  function renderProductResults(items) {
    activeResultIndex = -1;
    if (!items.length) {
      resultsBox.innerHTML = '<div class="search-empty">کالایی با این نام یا بارکد یافت نشد.</div>';
      resultsBox.classList.add("show");
      return;
    }
    resultsBox.innerHTML = items.map(p => `
      <div class="search-item" data-id="${p.id}" data-name="${p.name.replace(/"/g, "&quot;")}" data-group="${(p.product_group || "").replace(/"/g, "&quot;")}">
        <span class="search-item-name">${p.name}</span>
        <span class="search-item-meta">${p.product_group ? p.product_group + " · " : ""}${p.barcode}</span>
      </div>
    `).join("");
    resultsBox.classList.add("show");
    resultsBox.querySelectorAll(".search-item").forEach(el => {
      el.addEventListener("click", () => selectProduct(el.dataset.id, el.dataset.name, el.dataset.group));
    });
  }

  let activeResultIndex = -1;
  searchInput.addEventListener("keydown", (e) => {    const items = resultsBox.querySelectorAll(".search-item");
    if (!items.length || !resultsBox.classList.contains("show")) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeResultIndex = Math.min(activeResultIndex + 1, items.length - 1);
      highlightActive(items);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeResultIndex = Math.max(activeResultIndex - 1, 0);
      highlightActive(items);
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (activeResultIndex >= 0 && items[activeResultIndex]) {
        items[activeResultIndex].click();
      }
    } else if (e.key === "Escape") {
      resultsBox.classList.remove("show");
    }
  });

  function highlightActive(items) {
    items.forEach((el, i) => el.classList.toggle("active", i === activeResultIndex));
    if (items[activeResultIndex]) items[activeResultIndex].scrollIntoView({ block: "nearest" });
  }

  function populateJalaliSelects() {
    const yearSel = document.getElementById("expiry_year");
    const monthSel = document.getElementById("expiry_month");
    const daySel = document.getElementById("expiry_day");

    const [ty, tm, td] = nhTodayJalali();
    yearSel.innerHTML = "";
    for (let y = ty; y <= ty + 3; y++) {
      yearSel.innerHTML += `<option value="${y}">${y}</option>`;
    }
    yearSel.value = ty;

    monthSel.innerHTML = JALALI_MONTHS.map((m, i) => `<option value="${i + 1}">${m}</option>`).join("");
    monthSel.value = tm;

    function refreshDays(preferredDay) {
      const jm = parseInt(monthSel.value);
      const maxDay = nhDaysInJalaliMonth(jm);
      const prevDay = preferredDay || (daySel.value ? parseInt(daySel.value) : 1);
      daySel.innerHTML = "";
      for (let d = 1; d <= maxDay; d++) {
        daySel.innerHTML += `<option value="${d}">${d}</option>`;
      }
      daySel.value = Math.min(prevDay, maxDay);
    }
    monthSel.addEventListener("change", () => refreshDays());
    refreshDays(td);
  }
  populateJalaliSelects();

  function selectProduct(id, name, group) {
    selectedProductId = id;
    selectedProductName = name;
    selectedProductGroup = group || null;
    searchInput.value = "";
    resultsBox.innerHTML = "";
    resultsBox.classList.remove("show");
    selectedBox.innerHTML = `
      <span class="selected-chip-name">${name}</span>
      <button type="button" id="clearProductBtn" class="link-ghost">تغییر کالا</button>
    `;
    selectedBox.classList.add("show");
    document.getElementById("clearProductBtn").addEventListener("click", clearProduct);
  }

  function clearProduct() {
    selectedProductId = null;
    selectedProductName = null;
    selectedProductGroup = null;
    selectedBox.innerHTML = "";
    selectedBox.classList.remove("show");
  }

  function showError(message) {
    if (message === "SESSION_EXPIRED") {
      alertEl.textContent = "نشست شما منقضی شده است. در حال انتقال به صفحه‌ی ورود...";
      alertEl.classList.add("show");
      setTimeout(nhLogout, 1500);
      return;
    }
    alertEl.textContent = "خطا: " + message;
    alertEl.classList.add("show");
  }

  async function loadMyStore() {
    const query = `
      query MyRole($user_id: uuid!) {
        user_roles(where: { user_id: { _eq: $user_id } }, limit: 1) {
          store_id
          store { name region }
        }
      }
    `;
    const data = await nhGql(query, { user_id: session.userId }, session.token);
    if (!data.user_roles.length) {
      storeLabel.textContent = "فروشگاهی برای این حساب ثبت نشده";
      submitBtn.disabled = true;
      return;
    }
    myStoreId = data.user_roles[0].store_id;
    const s = data.user_roles[0].store;
    storeLabel.textContent = s.name + " — " + s.region;
    await loadBatches();
  }

  async function loadBatches() {
    const query = `
      query MyBatches($store_id: uuid!) {
        expiry_batches(
          where: { store_id: { _eq: $store_id } }
          order_by: { created_at: desc }
          limit: 30
        ) {
          id product_name quantity expiry_date status review_note
        }
      }
    `;
    const data = await nhGql(query, { store_id: myStoreId }, session.token);
    allBatches = data.expiry_batches;
    renderBatches();
  }

  function renderBatches() {
    const filter = document.getElementById("statusFilter").value;
    const rows = filter ? allBatches.filter(b => b.status === filter) : allBatches;
    if (!rows.length) {
      listWrap.innerHTML = allBatches.length
        ? '<div class="empty">با این فیلتر کالایی یافت نشد.</div>'
        : '<div class="empty">هنوز کالایی ثبت نشده است. اولین کالا را ثبت کنید.</div>';
      return;
    }
    listWrap.innerHTML = `
      <div class="table-wrap">
      <table>
        <thead><tr><th>کالا</th><th>تعداد</th><th>انقضا</th><th>وضعیت</th><th>یادداشت بررسی</th></tr></thead>
        <tbody>
          ${rows.map(b => `
            <tr>
              <td>${b.product_name}</td>
              <td class="num">${b.quantity}</td>
              <td class="num">${nhIsoToJalaliStr(b.expiry_date)}</td>
              <td><span class="${nhStampClass(b.status)}">${STATUS_LABEL[b.status] || b.status}</span></td>
              <td>${b.review_note || "—"}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    `;
  }

  document.getElementById("statusFilter").addEventListener("change", renderBatches);

  document.getElementById("productForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!myStoreId) return;
    alertEl.classList.remove("show");

    if (!selectedProductId) {
      showError("لطفاً یک کالا را از فهرست جست‌وجو انتخاب کنید.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "در حال ثبت...";

    const mutation = `
      mutation InsertBatch(
        $store_id: uuid!, $product_id: uuid!, $product_name: String!, $product_group: String, $quantity: numeric!,
        $expiry_date: date!, $created_by: uuid!
      ) {
        insert_expiry_batches_one(object: {
          store_id: $store_id, product_id: $product_id, product_name: $product_name, product_group: $product_group, quantity: $quantity,
          unit: "عدد", expiry_date: $expiry_date, discount_percent: 0,
          created_by: $created_by, status: "approved"
        }) { id }
      }
    `;

    const expiryIso = nhJalaliToIso(
      parseInt(document.getElementById("expiry_year").value),
      parseInt(document.getElementById("expiry_month").value),
      parseInt(document.getElementById("expiry_day").value)
    );

    try {
      await nhGql(mutation, {
        store_id: myStoreId,
        product_id: selectedProductId,
        product_name: selectedProductName,
        product_group: selectedProductGroup,
        quantity: parseInt(document.getElementById("quantity").value),
        expiry_date: expiryIso,
        created_by: session.userId
      }, session.token);

      document.getElementById("productForm").reset();
      clearProduct();
      populateJalaliSelects();
      await loadBatches();

    } catch (err) {
      showError(err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "ثبت کالا";
    }
  });

  loadMyStore().catch(err => showError(err.message));
</script>

</body>
</html>
