<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اپراتور | dailymarket-expiry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="brand-group">
    <div class="mark"><span>DM</span></div>
    <div class="brand-name">dailymarket-expiry<small>سامانه مدیریت کالای نزدیک به انقضا</small></div>
  </div>
  <div class="right">
    <span class="pill">اپراتور فروشگاه</span>
    <span class="context-label" id="storeLabel">در حال بارگذاری...</span>
    <a href="#" class="link-ghost" id="logoutBtn">خروج</a>
  </div>
</div>

<div class="container">
  <div class="page-head">
    <h1>ثبت کالای نزدیک به انقضا</h1>
    <p>پس از ثبت، کالا به‌صورت پیش‌نویس برای بررسی مدیر منطقه ارسال می‌شود.</p>
  </div>

  <div id="alert" class="alert alert-error"></div>

  <div class="card">
    <form id="productForm">
      <div class="field">
        <label for="product_name">نام کالا</label>
        <input type="text" id="product_name" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="quantity">تعداد / مقدار</label>
          <input type="number" id="quantity" required min="0" step="0.01">
        </div>
        <div class="field">
          <label for="unit">واحد</label>
          <input type="text" id="unit" required placeholder="عدد، کیلوگرم، بسته">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="expiry_date">تاریخ انقضا</label>
          <input type="date" id="expiry_date" required>
        </div>
        <div class="field">
          <label for="discount_percent">درصد تخفیف پیشنهادی</label>
          <input type="number" id="discount_percent" min="0" max="100" step="1" value="0">
        </div>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-block">ثبت پیش‌نویس</button>
    </form>
  </div>

  <div class="card">
    <h2 style="font-size:15px; margin:0 0 14px;">آخرین ثبت‌های این فروشگاه</h2>
    <div id="listWrap"><div class="empty">در حال بارگذاری فهرست...</div></div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const session = nhRequireRole(["store_operator"]);
  let myStoreId = null;

  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); nhLogout(); });

  const alertEl = document.getElementById("alert");
  const storeLabel = document.getElementById("storeLabel");
  const submitBtn = document.getElementById("submitBtn");
  const listWrap = document.getElementById("listWrap");

  function showError(message) {
    if (message === "SESSION_EXPIRED") {
      alertEl.textContent = "نشست شما منقضی شده است. در حال انتقال به صفحه‌ی ورود...";
      alertEl.classList.add("show");
      setTimeout(nhLogout, 1500);
      return;
    }
    alertEl.textContent = "خطا: " + message;
    alertEl.classList.add("show");
  }

  async function loadMyStore() {
    const query = `
      query MyRole($user_id: uuid!) {
        user_roles(where: { user_id: { _eq: $user_id } }, limit: 1) {
          store_id
          store { name region }
        }
      }
    `;
    const data = await nhGql(query, { user_id: session.userId }, session.token);
    if (!data.user_roles.length) {
      storeLabel.textContent = "فروشگاهی برای این حساب ثبت نشده";
      submitBtn.disabled = true;
      return;
    }
    myStoreId = data.user_roles[0].store_id;
    const s = data.user_roles[0].store;
    storeLabel.textContent = s.name + " — " + s.region;
    await loadBatches();
  }

  async function loadBatches() {
    const query = `
      query MyBatches($store_id: uuid!) {
        expiry_batches(
          where: { store_id: { _eq: $store_id } }
          order_by: { created_at: desc }
          limit: 15
        ) {
          id product_name quantity unit expiry_date status review_note
        }
      }
    `;
    const data = await nhGql(query, { store_id: myStoreId }, session.token);
    const rows = data.expiry_batches;
    if (!rows.length) {
      listWrap.innerHTML = '<div class="empty">هنوز کالایی ثبت نشده است. اولین پیش‌نویس را ثبت کنید.</div>';
      return;
    }
    listWrap.innerHTML = `
      <div class="table-wrap">
      <table>
        <thead><tr><th>کالا</th><th>تعداد</th><th>انقضا</th><th>وضعیت</th><th>یادداشت بررسی</th></tr></thead>
        <tbody>
          ${rows.map(b => `
            <tr>
              <td>${b.product_name}</td>
              <td class="num">${b.quantity} ${b.unit}</td>
              <td class="num">${b.expiry_date}</td>
              <td><span class="${nhStampClass(b.status)}">${STATUS_LABEL[b.status] || b.status}</span></td>
              <td>${b.review_note || "—"}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    `;
  }

  document.getElementById("productForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!myStoreId) return;
    alertEl.classList.remove("show");
    submitBtn.disabled = true;
    submitBtn.textContent = "در حال ثبت...";

    const mutation = `
      mutation InsertBatch(
        $store_id: uuid!, $product_name: String!, $quantity: numeric!,
        $unit: String!, $expiry_date: date!, $discount_percent: numeric, $created_by: uuid!
      ) {
        insert_expiry_batches_one(object: {
          store_id: $store_id, product_name: $product_name, quantity: $quantity,
          unit: $unit, expiry_date: $expiry_date, discount_percent: $discount_percent,
          created_by: $created_by, status: "draft"
        }) { id }
      }
    `;

    try {
      await nhGql(mutation, {
        store_id: myStoreId,
        product_name: document.getElementById("product_name").value.trim(),
        quantity: parseFloat(document.getElementById("quantity").value),
        unit: document.getElementById("unit").value.trim(),
        expiry_date: document.getElementById("expiry_date").value,
        discount_percent: parseFloat(document.getElementById("discount_percent").value) || 0,
        created_by: session.userId
      }, session.token);

      document.getElementById("productForm").reset();
      await loadBatches();

    } catch (err) {
      showError(err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "ثبت پیش‌نویس";
    }
  });

  loadMyStore().catch(err => showError(err.message));
</script>

</body>
</html>
